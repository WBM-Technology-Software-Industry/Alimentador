events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name dashboard.wbmtechnologysoftware.com.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name dashboard.wbmtechnologysoftware.com.br;

        ssl_certificate     /etc/letsencrypt/live/dashboard.wbmtechnologysoftware.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.wbmtechnologysoftware.com.br/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Backend API + uploads
        location /api/ {
            proxy_pass         http://backend:8080/api/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /files/ {
            proxy_pass         http://backend:8080/files/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Frontend (Next.js standalone)
        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
