server {
    listen 80;
    server_name dashboard.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.local;

    ssl_certificate     /etc/nginx/certs/dashboard.local+1.pem;
    ssl_certificate_key /etc/nginx/certs/dashboard.local+1-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
