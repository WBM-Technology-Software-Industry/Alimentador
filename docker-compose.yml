services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: feeder
      POSTGRES_USER: feeder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-feeder123}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/feeder
      DATABASE_USER: feeder
      DATABASE_PASSWORD: ${DB_PASSWORD:-feeder123}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://152.67.43.175:1883}
    ports:
      - "8080:8080"

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080

volumes:
  postgres_data:
