# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ── Banco de dados ────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/dashboard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dashboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dashboard123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP ──────────────────────────────────────────────────────────────────
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=600000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Upload ────────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=uploads
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:wbm-dashboard-jwt-secret-key-must-be-at-least-256-bits-long-2024}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ── E-mail (SMTP) ─────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:noreply@wbmtechnology.com.br}}

